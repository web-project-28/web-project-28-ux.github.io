<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRMAP Lost & Found Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .srmap-blue { background: #004a99; }
        .hidden { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #image-preview img { width: 100%; border-radius: 1rem; margin-top: 10px; border: 2px solid #e2e8f0; max-height: 200px; object-fit: cover; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- LOGIN SCREEN -->
    <div id="auth-ui" class="h-screen flex items-center justify-center px-6">
        <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-2xl border text-center">
            <img src="https://srmap.edu.in/wp-content/uploads/2020/01/srm-logo.png" class="w-40 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-2 italic">SRMAP HUB</h1>
            <p class="text-xs text-gray-400 mb-6 uppercase tracking-widest font-bold">Encrypted Login</p>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="name@srmap.edu.in" class="w-full bg-gray-50 border rounded-2xl p-4 outline-none focus:border-blue-600">
                <input type="password" id="pass" placeholder="Password" class="w-full bg-gray-50 border rounded-2xl p-4 outline-none focus:border-blue-600">
                <button onclick="handleAuth()" id="auth-btn" class="w-full srmap-blue text-white py-4 rounded-2xl font-black shadow-lg">Login / Sign Up</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app" class="hidden min-h-screen pb-24">
        <header class="srmap-blue text-white p-5 flex justify-between items-center sticky top-0 z-50 shadow-xl">
            <h1 class="font-black italic text-lg tracking-tighter">SRMAP HUB</h1>
            <button onclick="location.reload()" class="bg-white/10 border border-white/20 px-4 py-2 rounded-xl text-xs font-bold uppercase">Logout</button>
        </header>

        <!-- ALL LOCATIONS FILTER BAR -->
        <div class="bg-white border-b flex gap-2 p-3 overflow-x-auto no-scrollbar sticky top-[68px] z-40 shadow-sm">
            <button onclick="loadItems('All')" class="px-5 py-2 rounded-full bg-blue-600 text-white text-xs font-black">ALL</button>
            <button onclick="loadItems('V Block')" class="px-5 py-2 rounded-full bg-gray-100 text-xs font-bold">V-BLOCK</button>
            <button onclick="loadItems('SR Block')" class="px-5 py-2 rounded-full bg-gray-100 text-xs font-bold">SR-BLOCK</button>
            <button onclick="loadItems('Mess')" class="px-5 py-2 rounded-full bg-gray-100 text-xs font-bold">MESS</button>
            <button onclick="loadItems('Hostel')" class="px-5 py-2 rounded-full bg-gray-100 text-xs font-bold">HOSTELS</button>
            <button onclick="loadItems('Court')" class="px-5 py-2 rounded-full bg-gray-100 text-xs font-bold">COURTS</button>
            <button onclick="loadItems('Tree Court')" class="px-5 py-2 rounded-full bg-gray-100 text-xs font-bold">TREE-COURT</button>
            <button onclick="loadItems('Flag')" class="px-5 py-2 rounded-full bg-gray-100 text-xs font-bold">FLAG-AREA</button>
        </div>

        <main class="p-4 max-w-xl mx-auto space-y-4" id="feed">
            <!-- Items load here -->
        </main>

        <button onclick="document.getElementById('post-modal').classList.remove('hidden')" class="fixed bottom-8 right-8 w-16 h-16 srmap-blue text-white rounded-full shadow-2xl z-50 text-4xl border-4 border-white font-bold">+</button>
    </div>

    <!-- POST MODAL -->
    <div id="post-modal" class="hidden fixed inset-0 bg-white z-[100] p-8 overflow-y-auto fade-in">
        <h2 class="text-2xl font-black mb-6">Post to Hub</h2>
        <div class="space-y-4">
            <!-- Camera -->
            <div class="bg-blue-50 border-2 border-dashed border-blue-200 rounded-3xl p-6 text-center cursor-pointer" onclick="document.getElementById('cam').click()">
                <input type="file" id="cam" accept="image/*" capture="environment" class="hidden" onchange="previewFile()">
                <span id="cam-text" class="text-blue-600 font-black text-xs">📸 TAKE PHOTO</span>
                <div id="image-preview"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <label class="flex-1 border p-4 rounded-2xl text-center font-bold"><input type="radio" name="i_type" value="Lost" checked> Lost</label>
                <label class="flex-1 border p-4 rounded-2xl text-center font-bold"><input type="radio" name="i_type" value="Found"> Found</label>
            </div>

            <input type="text" id="i_name" placeholder="Item Name (e.g. Milton Bottle)" class="w-full border-b p-4 font-bold text-lg outline-none">
            
            <select id="i_loc" class="w-full border-b p-4 bg-transparent outline-none">
                <option value="">Select SRMAP Location</option>
                <option>V Block (Vikram Sarabhai)</option>
                <option>SR Block</option>
                <option>Central Mess</option>
                <option>Ganga Mess</option>
                <option>Football Court</option>
                <option>Basketball Court</option>
                <option>Girls Hostel</option>
                <option>Boys Hostel</option>
                <option>Ganga Hostel</option>
                <option>Vedavathi Hostel</option>
                <option>Tree Court Area</option>
                <option>Flag Area</option>
            </select>

            <textarea id="i_desc" placeholder="Details (Color, Unique marks...)" class="w-full border rounded-3xl p-4 h-24 bg-gray-50 outline-none"></textarea>
            
            <button onclick="uploadItem()" id="post-btn" class="w-full srmap-blue text-white py-5 rounded-2xl font-black text-lg shadow-xl transition-all active:scale-95">Post Report</button>
            <button onclick="document.getElementById('post-modal').classList.add('hidden')" class="w-full py-4 text-gray-400 font-bold uppercase text-xs">Cancel</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://vgnqynsmfcwidllpasne.supabase.co";
        const SUPABASE_KEY = "sb_publishable_VlRvXco2rViFdNVJfTCf7Q_4jIgKv9q";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let base64Image = "";

        // AUTH Logic
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            if(!email.endsWith('@srmap.edu.in')) return alert("Please use your @srmap.edu.in email");

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) {
                const { error: signUpError } = await _supabase.auth.signUp({ email, password });
                if (signUpError) return alert(signUpError.message);
                alert("Account created! Please log in now.");
            } else {
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                loadItems('All');
            }
        }

        // Image Preview Logic
        function previewFile() {
            const file = document.getElementById('cam').files[0];
            const reader = new FileReader();
            reader.onloadend = () => { 
                base64Image = reader.result; 
                document.getElementById('image-preview').innerHTML = `<img src="${base64Image}" />`; 
                document.getElementById('cam-text').innerText = "✅ Captured";
            };
            if (file) reader.readAsDataURL(file);
        }

        // POST Logic (FIXED)
        async function uploadItem() {
            const name = document.getElementById('i_name').value;
            const loc = document.getElementById('i_loc').value;
            const type = document.querySelector('input[name="i_type"]:checked').value;
            const desc = document.getElementById('i_desc').value;
            const btn = document.getElementById('post-btn');

            if(!name || !loc) return alert("Please enter both Name and Location");

            try {
                btn.innerText = "Posting...";
                btn.disabled = true;

                const userResponse = await _supabase.auth.getUser();
                const user = userResponse.data.user;

                if(!user) throw new Error("User not logged in");

                const { error } = await _supabase.from('reports').insert([{ 
                    item_name: name, 
                    location: loc, 
                    type: type, 
                    description: desc, 
                    phone: user.email, 
                    image: base64Image 
                }]);

                if (error) throw error;

                alert("Successfully Posted!");
                location.reload(); 
            } catch (err) {
                alert("Error: " + err.message);
                btn.innerText = "Post Report";
                btn.disabled = false;
            }
        }

        // LOAD Feed Logic
        async function loadItems(filter) {
            const { data, error } = await _supabase.from('reports').select('*').order('created_at', { ascending: false });
            if (error) return console.log(error);

            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            data.forEach(item => {
                if (filter !== 'All' && !item.location.includes(filter)) return;
                
                feed.innerHTML += `
                <div class="bg-white p-5 rounded-3xl border shadow-sm fade-in">
                    <div class="flex justify-between mb-3">
                        <span class="text-[10px] font-black px-3 py-1 rounded-full ${item.type === 'Lost' ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'} uppercase">${item.type}</span>
                        <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">${item.location}</span>
                    </div>
                    ${item.image ? `<img src="${item.image}" class="w-full rounded-2xl mb-4 h-52 object-cover border" />` : ''}
                    <h2 class="text-xl font-black text-gray-800">${item.item_name}</h2>
                    <p class="text-sm text-gray-500 mt-2">${item.description}</p>
                    <div class="mt-4 pt-4 border-t flex justify-between items-center text-[10px] text-gray-400 font-bold uppercase">
                        <span>Reporter: ${item.phone.split('@')[0]}</span>
                        <a href="mailto:${item.phone}" class="text-blue-600 underline">Contact</a>
                    </div>
                </div>`;
            });
        }
    </script>
</body>
</html>
