<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRMAP Lost & Found Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .srmap-blue { background: #004a99; }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        #image-preview img { width: 100%; border-radius: 1rem; margin-top: 10px; border: 2px solid #cbd5e1; max-height: 250px; object-fit: cover; }
        /* HIGHLIGHT FIX */
        .filter-active { background-color: #004a99 !important; color: white !important; font-weight: 900; box-shadow: 0 4px 10px rgba(0, 74, 153, 0.4); border: none !important; }
        .chat-me { background: #004a99; color: white; align-self: flex-end; border-radius: 15px 15px 0 15px; }
        .chat-them { background: #e2e8f0; color: #1a202c; align-self: flex-start; border-radius: 15px 15px 15px 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <!-- 1. LOGIN SCREEN (Hidden by default to prevent flicker) -->
    <div id="auth-ui" class="hidden h-screen flex items-center justify-center px-6 bg-white">
        <div class="w-full max-w-md text-center">
            <img src="https://srmap.edu.in/wp-content/uploads/2020/01/srm-logo.png" class="w-48 mx-auto mb-8 p-2 bg-white rounded-xl shadow-sm border">
            <div class="bg-white p-8 rounded-3xl shadow-2xl border border-slate-100">
                <h1 class="text-2xl font-black mb-1 italic text-slate-800 uppercase tracking-tighter">Student Login</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-6">SRMAP Verified Access</p>
                <div class="space-y-4">
                    <input type="email" id="email" placeholder="name@srmap.edu.in" class="w-full bg-slate-50 border rounded-2xl p-4 outline-none focus:border-blue-600">
                    <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-50 border rounded-2xl p-4 outline-none focus:border-blue-600">
                    <button onclick="handleAuth()" id="auth-btn" class="w-full srmap-blue text-white py-4 rounded-2xl font-black shadow-lg">Login / Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. MAIN HUB -->
    <div id="app" class="hidden min-h-screen pb-24">
        <header class="srmap-blue text-white p-4 flex justify-between items-center sticky top-0 z-50 shadow-xl">
            <div class="flex items-center gap-3">
                <img src="https://srmap.edu.in/wp-content/uploads/2020/01/srm-logo.png" class="h-10 bg-white p-1 rounded-lg">
                <h1 class="font-black italic text-lg tracking-tighter">SRMAP HUB</h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleModal('help-modal')" class="bg-white/20 px-3 py-2 rounded-xl text-xs font-bold uppercase">Help</button>
                <button onclick="handleLogout()" class="bg-red-500 px-3 py-2 rounded-xl text-xs font-bold uppercase">Logout</button>
            </div>
        </header>

        <!-- DASHBOARD -->
        <div class="grid grid-cols-3 gap-2 p-4 max-w-xl mx-auto">
            <div class="bg-white p-4 rounded-2xl shadow-sm border text-center"><p class="text-[8px] font-black text-slate-400 uppercase">Lost</p><h2 id="lostCount" class="text-xl font-black text-red-600">0</h2></div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border text-center"><p class="text-[8px] font-black text-slate-400 uppercase">Found</p><h2 id="foundCount" class="text-xl font-black text-green-600">0</h2></div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border bg-blue-50 text-center"><p class="text-[8px] font-black text-blue-400 uppercase">Recovered</p><h2 id="recoveredCount" class="text-xl font-black text-blue-600">0</h2></div>
        </div>

        <!-- FILTER BAR -->
        <div id="filter-container" class="bg-white border-b flex gap-2 p-3 overflow-x-auto no-scrollbar sticky top-[72px] z-40 shadow-sm">
            <button id="f-All" onclick="filterData('All')" class="filter-btn px-6 py-2 rounded-full bg-slate-100 text-slate-600 text-xs font-black filter-active">ALL</button>
            <button id="f-V-Block" onclick="filterData('V Block')" class="filter-btn px-6 py-2 rounded-full bg-slate-100 text-slate-600 text-xs font-black">V-BLOCK</button>
            <button id="f-SR-Block" onclick="filterData('SR Block')" class="filter-btn px-6 py-2 rounded-full bg-slate-100 text-slate-600 text-xs font-black">SR-BLOCK</button>
            <button id="f-Mess" onclick="filterData('Mess')" class="filter-btn px-6 py-2 rounded-full bg-slate-100 text-slate-600 text-xs font-black">MESS</button>
            <button id="f-Hostel" onclick="filterData('Hostel')" class="filter-btn px-6 py-2 rounded-full bg-slate-100 text-slate-600 text-xs font-black uppercase">Hostels</button>
            <button id="f-Court" onclick="filterData('Court')" class="filter-btn px-6 py-2 rounded-full bg-slate-100 text-slate-600 text-xs font-black uppercase">Courts</button>
            <button id="f-Tree-Court" onclick="filterData('Tree Court')" class="filter-btn px-6 py-2 rounded-full bg-slate-100 text-slate-600 text-xs font-black whitespace-nowrap">TREE-COURT</button>
            <button id="f-Flag" onclick="filterData('Flag')" class="filter-btn px-6 py-2 rounded-full bg-slate-100 text-slate-600 text-xs font-black whitespace-nowrap">FLAG-AREA</button>
        </div>

        <main class="p-4 max-w-xl mx-auto space-y-4" id="feed"></main>

        <button onclick="toggleModal('post-modal')" class="fixed bottom-8 right-8 w-16 h-16 srmap-blue text-white rounded-full shadow-2xl z-50 text-4xl border-4 border-white font-bold transition-transform active:scale-90">+</button>
    </div>

    <!-- POST SUCCESS MODAL -->
    <div id="success-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-[300] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 text-center fade-in">
            <div class="text-6xl mb-4" id="success-emoji">🎉</div>
            <h2 class="text-2xl font-black mb-2 uppercase">Success!</h2>
            <p id="random-quote" class="text-gray-500 italic mb-8 px-2 text-sm leading-relaxed"></p>
            <button onclick="closeSuccess()" class="w-full srmap-blue text-white py-4 rounded-2xl font-black shadow-xl">Back to Feed 😍</button>
        </div>
    </div>

    <!-- HELP MODAL -->
    <div id="help-modal" class="hidden fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-2 italic">Help Desk</h2>
            <p class="text-gray-500 text-sm italic mb-4">"Kindness is the language which the deaf can hear and the blind can see. - Mark Twain"</p>
            <div class="bg-slate-50 p-4 rounded-2xl mb-6">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Admin Support</p>
                <a href="mailto:binomialtheorem9@gmail.com" class="text-blue-600 font-bold text-xs">binomialtheorem9@gmail.com</a>
            </div>
            <button onclick="toggleModal('help-modal')" class="w-full srmap-blue text-white py-3 rounded-2xl font-bold">Close</button>
        </div>
    </div>

    <!-- POST MODAL -->
    <div id="post-modal" class="hidden fixed inset-0 bg-white z-[100] p-8 overflow-y-auto">
        <h2 class="text-2xl font-black mb-6 italic tracking-tight">Report Item</h2>
        <div class="space-y-4">
            <div class="bg-blue-50 border-2 border-dashed border-blue-200 rounded-3xl p-6 text-center cursor-pointer" onclick="document.getElementById('cam').click()">
                <input type="file" id="cam" accept="image/*" capture="environment" class="hidden" onchange="previewAndCompress()">
                <span id="cam-text" class="text-blue-600 font-bold text-xs uppercase">📸 Take Photo</span>
                <div id="image-preview"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <label class="flex-1 border p-4 rounded-2xl text-center font-bold cursor-pointer"><input type="radio" name="i_type" value="Lost" checked> Lost</label>
                <label class="flex-1 border p-4 rounded-2xl text-center font-bold cursor-pointer"><input type="radio" name="i_type" value="Found"> Found</label>
            </div>
            <input type="text" id="i_name" placeholder="Item Name" class="w-full border-b p-3 font-bold text-lg outline-none">
            <select id="i_loc" class="w-full border-b p-3 bg-transparent outline-none font-bold">
                <option value="">Select Area</option>
                <option value="V Block">V Block</option><option value="SR Block">SR Block</option><option value="Mess">Mess Area</option>
                <option value="Court">Courts Area</option><option value="Hostel">Hostels Area</option>
                <option value="Tree Court">Tree Court Area</option><option value="Flag">Flag Area</option>
            </select>
            <textarea id="i_desc" placeholder="Details (Color, marks, etc.)" class="w-full border rounded-3xl p-4 h-24 bg-slate-50 outline-none"></textarea>
            <button onclick="uploadItem()" id="post-btn" class="w-full srmap-blue text-white py-5 rounded-2xl font-black shadow-xl text-lg">POST NOW</button>
            <button onclick="toggleModal('post-modal')" class="w-full py-4 text-slate-400 font-bold text-xs uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <!-- CHAT MODAL -->
    <div id="chat-modal" class="hidden fixed inset-0 bg-white z-[200] flex flex-col">
        <header class="srmap-blue text-white p-4 flex items-center gap-4">
            <button onclick="closeChat()" class="text-xl">←</button>
            <h2 id="chat-title" class="font-bold text-sm">Private Messaging</h2>
        </header>
        <div id="chat-messages" class="flex-grow p-4 overflow-y-auto flex flex-col gap-3 bg-slate-50"></div>
        <div class="p-4 border-t flex gap-2">
            <input type="text" id="chat-input" placeholder="Type message..." class="flex-grow border rounded-full px-5 py-3 outline-none">
            <button onclick="sendMsg()" class="srmap-blue text-white w-12 h-12 rounded-full flex items-center justify-center font-bold">➤</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://vgnqynsmfcwidllpasne.supabase.co";
        const SUPABASE_KEY = "sb_publishable_VlRvXco2rViFdNVJfTCf7Q_4jIgKv9q";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const quotes = [
            "Kindness is a gift everyone can afford to give. 🎁",
            "Small acts make a big difference on campus. 🏫",
            "Honesty is the fastest way to build trust. ✨",
            "Great things are done by a series of small acts. 🌟",
            "Help others and you will find yourself helped too. 🙌",
            "Integrity is doing the right thing when no one is watching. 🛡️",
            "The best way to find yourself is in the service of others. 💎",
            "Generosity is the soul of our SRM community. 😊",
            "A simple return can save someone's day. 🌈",
            "Keep the campus spirit alive with your kindness. ❤️"
        ];

        let cachedData = [];
        let base64Image = "";
        let currentChatUser = "";
        let chatInterval;
        let currentUser = null;
        let currentFilter = "All";

        // --- SESSION REFRESH FIX ---
        (async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('app').classList.remove('hidden');
                fetchInitialData();
            } else {
                document.getElementById('auth-ui').classList.remove('hidden');
            }
        })();

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            if(!email.endsWith('@srmap.edu.in')) return alert("Use @srmap.edu.in email");
            const btn = document.getElementById('auth-btn'); btn.innerText = "Connecting...";
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) {
                const { data: sData, error: sError } = await _supabase.auth.signUp({ email, password });
                if (sError) { alert(sError.message); btn.innerText = "Login / Sign Up"; }
                else { alert("Account Created! Login now."); btn.innerText = "Login / Sign Up"; }
            } else { location.reload(); } // Simple reload after login to initialize state
        }

        async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }

        async function fetchInitialData() {
            const { data, error } = await _supabase.from('reports').select('*').order('created_at', { ascending: false });
            if (!error) {
                cachedData = data;
                renderUI();
            }
        }

        function filterData(filter) {
            currentFilter = filter;
            renderUI();
        }

        function renderUI() {
            // FIX BLUE HIGHLIGHTS (Strict ID match)
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('filter-active'));
            const activeID = 'f-' + currentFilter.replace(/\s+/g, '-');
            const activeBtn = document.getElementById(activeID);
            if(activeBtn) activeBtn.classList.add('filter-active');

            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            let l=0, f=0, r=0;

            cachedData.forEach(item => {
                if (item.status === 'Recovered') r++; else if (item.type === 'Lost') l++; else f++;
                if (currentFilter !== 'All' && !item.location.includes(currentFilter)) return;

                const isOwner = currentUser && currentUser.email === item.phone;
                feed.innerHTML += `
                <div class="bg-white p-5 rounded-3xl border shadow-sm fade-in ${item.status === 'Recovered' ? 'opacity-50 grayscale' : ''}">
                    <div class="flex justify-between mb-3 text-[10px] font-black uppercase">
                        <span class="px-2 py-1 rounded-full ${item.status === 'Recovered' ? 'bg-slate-200' : (item.type === 'Lost' ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600')}">${item.status === 'Recovered' ? 'Recovered' : item.type}</span>
                        <span class="text-blue-600 tracking-widest">${item.location}</span>
                    </div>
                    ${item.image ? `<img src="${item.image}" class="w-full rounded-2xl mb-4 h-52 object-cover" />` : ''}
                    <h2 class="text-xl font-black text-slate-800 leading-tight">${item.item_name}</h2>
                    <p class="text-sm text-slate-500 mt-2">${item.description}</p>
                    <div class="mt-4 pt-4 border-t flex flex-col gap-2">
                        ${item.status === 'Active' ? (isOwner ? `<button onclick="resolveItem(${item.id})" class="w-full srmap-blue text-white py-3 rounded-2xl font-bold">Mark as Recovered</button>` : `<button onclick="startChat('${item.phone}')" class="w-full bg-blue-50 text-blue-700 py-3 rounded-2xl font-bold">Message Reporter</button>`) : '<p class="text-center font-bold text-[10px] text-slate-400 italic">SUCCESSFULLY RETURNED</p>'}
                    </div>
                </div>`;
            });
            document.getElementById('lostCount').innerText = l;
            document.getElementById('foundCount').innerText = f;
            document.getElementById('recoveredCount').innerText = r;
        }

        async function uploadItem() {
            const name = document.getElementById('i_name').value;
            const loc = document.getElementById('i_loc').value;
            const type = document.querySelector('input[name="i_type"]:checked').value;
            const desc = document.getElementById('i_desc').value;
            if(!name || !loc) return alert("Fill Name and Location");
            const btn = document.getElementById('post-btn'); btn.innerText = "Posting...";

            const newItem = { id: Date.now(), item_name: name, location: loc, type: type, description: desc, phone: currentUser.email, image: base64Image, status: 'Active', created_at: new Date().toISOString() };
            
            const { error } = await _supabase.from('reports').insert([newItem]);
            if (!error) {
                cachedData.unshift(newItem);
                document.getElementById('random-quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
                toggleModal('post-modal');
                toggleModal('success-modal');
                renderUI();
                btn.innerText = "POST NOW";
            } else { alert(error.message); btn.innerText = "POST NOW"; }
        }

        function previewAndCompress() {
            const file = document.getElementById('cam').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = 500 / img.width;
                    canvas.width = 500; canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Image = canvas.toDataURL('image/jpeg', 0.5);
                    document.getElementById('image-preview').innerHTML = `<img src="${base64Image}" />`;
                };
            };
            if (file) reader.readAsDataURL(file);
        }

        async function resolveItem(id) { 
            await _supabase.from('reports').update({ status: 'Recovered' }).eq('id', id); 
            cachedData = cachedData.map(item => item.id === id ? {...item, status: 'Recovered'} : item);
            renderUI();
        }

        function closeSuccess() { toggleModal('success-modal'); }
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function closeChat() { document.getElementById('chat-modal').classList.add('hidden'); clearInterval(chatInterval); }
        async function startChat(receiver) {
            currentChatUser = receiver;
            document.getElementById('chat-title').innerText = "Chat with " + receiver.split('@')[0];
            document.getElementById('chat-modal').classList.remove('hidden');
            fetchMessages(); chatInterval = setInterval(fetchMessages, 3000);
        }
        async function sendMsg() {
            const content = document.getElementById('chat-input').value;
            if(!content) return;
            await _supabase.from('messages').insert([{ sender_email: currentUser.email, receiver_email: currentChatUser, content: content }]);
            document.getElementById('chat-input').value = ""; fetchMessages();
        }
        async function fetchMessages() {
            const { data } = await _supabase.from('messages').select('*').or(`and(sender_email.eq.${currentUser.email},receiver_email.eq.${currentChatUser}),and(sender_email.eq.${currentChatUser},receiver_email.eq.${currentUser.email})`).order('created_at', { ascending: true });
            if(data) {
                const chatBox = document.getElementById('chat-messages');
                chatBox.innerHTML = data.map(m => `<div class="max-w-[80%] p-3 text-sm ${m.sender_email === currentUser.email ? 'chat-me' : 'chat-them'}">${m.content}</div>`).join('');
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
