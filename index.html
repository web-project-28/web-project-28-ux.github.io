<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRMAP Lost & Found Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .srmap-blue { background: #004a99; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #image-preview img { width: 100%; border-radius: 1rem; margin-top: 10px; border: 2px solid #e2e8f0; }
        .chat-bubble-me { background: #004a99; color: white; align-self: flex-end; border-radius: 15px 15px 0 15px; }
        .chat-bubble-them { background: #e2e8f0; color: #1a202c; align-self: flex-start; border-radius: 15px 15px 15px 0; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- 1. LOGIN / SIGNUP SCREEN -->
    <div id="auth-ui" class="h-screen flex items-center justify-center px-6">
        <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-2xl border text-center">
            <img src="https://srmap.edu.in/wp-content/uploads/2020/01/srm-logo.png" class="w-40 mx-auto mb-8">
            <h1 id="title" class="text-2xl font-black mb-2">Student Login</h1>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="name@srmap.edu.in" class="w-full bg-gray-50 border rounded-2xl p-4 outline-none">
                <input type="password" id="pass" placeholder="Password" class="w-full bg-gray-50 border rounded-2xl p-4 outline-none">
                <button onclick="handleAuth()" class="w-full srmap-blue text-white py-4 rounded-2xl font-black shadow-lg">Login</button>
                <button onclick="toggleMode()" id="toggle" class="text-sm text-blue-600 font-bold mt-4 underline">New here? Create Account</button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN HUB -->
    <div id="app" class="hidden min-h-screen pb-24">
        <header class="srmap-blue text-white p-5 flex justify-between items-center sticky top-0 z-50 shadow-xl">
            <h1 class="font-black italic text-lg">SRMAP HUB</h1>
            <div class="flex gap-2">
                <button onclick="openInbox()" class="bg-white/20 p-2 rounded-xl text-lg">📩</button>
                <button onclick="location.reload()" class="bg-white/20 px-3 py-1 rounded-xl text-xs font-bold uppercase">Logout</button>
            </div>
        </header>

        <div class="p-4 max-w-xl mx-auto space-y-4" id="feed">
            <!-- Items load here -->
        </div>

        <button onclick="document.getElementById('post-modal').classList.remove('hidden')" class="fixed bottom-8 right-8 w-16 h-16 srmap-blue text-white rounded-full shadow-2xl z-50 text-4xl border-4 border-white font-bold">+</button>
    </div>

    <!-- 3. POST MODAL -->
    <div id="post-modal" class="hidden fixed inset-0 bg-white z-[100] p-8 overflow-y-auto fade-in">
        <h2 class="text-2xl font-black mb-6">Report Item</h2>
        <div class="space-y-4">
            <div class="bg-blue-50 border-2 border-dashed border-blue-200 rounded-3xl p-6 text-center cursor-pointer" onclick="document.getElementById('cam').click()">
                <input type="file" id="cam" accept="image/*" capture="environment" class="hidden" onchange="previewFile()">
                <span id="cam-text" class="text-blue-600 font-black text-xs uppercase">📸 Tap Photo</span>
                <div id="image-preview"></div>
            </div>
            <input type="text" id="i_name" placeholder="Item Name" class="w-full border-b p-4 font-bold text-lg">
            <select id="i_loc" class="w-full border-b p-4 bg-transparent">
                <option value="">Location</option>
                <option>V Block</option><option>SR Block</option><option>Mess</option><option>Court</option><option>Hostel</option>
            </select>
            <textarea id="i_desc" placeholder="Details..." class="w-full border rounded-3xl p-4 h-20"></textarea>
            <button onclick="uploadItem()" id="post-btn" class="w-full srmap-blue text-white py-5 rounded-2xl font-black text-xl shadow-xl">Post Report</button>
            <button onclick="document.getElementById('post-modal').classList.add('hidden')" class="w-full py-4 text-gray-400">Cancel</button>
        </div>
    </div>

    <!-- 4. CHAT MODAL -->
    <div id="chat-modal" class="hidden fixed inset-0 bg-white z-[200] flex flex-col fade-in">
        <header class="srmap-blue text-white p-4 flex items-center gap-4">
            <button onclick="closeChat()" class="text-xl">←</button>
            <div>
                <h2 id="chat-title" class="font-bold">Chat</h2>
                <p id="chat-item" class="text-[10px] opacity-70 italic"></p>
            </div>
        </header>
        <div id="chat-messages" class="flex-grow p-4 overflow-y-auto flex flex-col gap-3 bg-gray-50">
            <!-- Messages load here -->
        </div>
        <div class="p-4 border-t flex gap-2">
            <input type="text" id="chat-input" placeholder="Type a message..." class="flex-grow border rounded-full px-5 py-3 outline-none">
            <button onclick="sendMsg()" class="srmap-blue text-white w-12 h-12 rounded-full flex items-center justify-center">➤</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://vgnqynsmfcwidllpasne.supabase.co";
        const SUPABASE_KEY = "sb_publishable_VlRvXco2rViFdNVJfTCf7Q_4jIgKv9q";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isSignUp = false;
        let base64Image = "";
        let currentChatUser = "";
        let currentChatItem = "";

        function toggleMode() {
            isSignUp = !isSignUp;
            document.getElementById('title').innerText = isSignUp ? "Create Account" : "Student Login";
        }

        function previewFile() {
            const file = document.getElementById('cam').files[0];
            const reader = new FileReader();
            reader.onloadend = () => { base64Image = reader.result; document.getElementById('image-preview').innerHTML = `<img src="${base64Image}" />`; }
            if (file) reader.readAsDataURL(file);
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const { data, error } = isSignUp ? await _supabase.auth.signUp({ email, password }) : await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else { document.getElementById('auth-ui').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); loadItems(); }
        }

        async function uploadItem() {
            const name = document.getElementById('i_name').value;
            const loc = document.getElementById('i_loc').value;
            const user = (await _supabase.auth.getUser()).data.user;
            await _supabase.from('reports').insert([{ item_name: name, location: loc, type: document.querySelector('input[name="i_type"]:checked').value, description: document.getElementById('i_desc').value, phone: user.email, image: base64Image }]);
            location.reload();
        }

        async function loadItems() {
            const { data } = await _supabase.from('reports').select('*').order('created_at', { ascending: false });
            document.getElementById('feed').innerHTML = data.map(item => `
                <div class="bg-white p-5 rounded-3xl border shadow-sm">
                    ${item.image ? `<img src="${item.image}" class="w-full rounded-2xl mb-4 h-48 object-cover" />` : ''}
                    <h2 class="text-xl font-black">${item.item_name}</h2>
                    <p class="text-xs text-blue-600 font-bold">${item.location}</p>
                    <button onclick="startChat('${item.phone}', '${item.item_name}')" class="mt-4 w-full bg-blue-50 text-blue-700 py-3 rounded-2xl font-bold">Message Finder</button>
                </div>
            `).join('');
        }

        // --- CHAT LOGIC ---
        async function startChat(receiver, item) {
            currentChatUser = receiver;
            currentChatItem = item;
            document.getElementById('chat-title').innerText = receiver.split('@')[0];
            document.getElementById('chat-item').innerText = "Regarding: " + item;
            document.getElementById('chat-modal').classList.remove('hidden');
            fetchMessages();
            // Auto-refresh chat every 3 seconds
            setInterval(fetchMessages, 3000);
        }

        function closeChat() { document.getElementById('chat-modal').classList.add('hidden'); }

        async function sendMsg() {
            const content = document.getElementById('chat-input').value;
            const user = (await _supabase.auth.getUser()).data.user;
            if(!content) return;

            await _supabase.from('messages').insert([{
                sender_email: user.email,
                receiver_email: currentChatUser,
                content: content,
                item_name: currentChatItem
            }]);

            document.getElementById('chat-input').value = "";
            fetchMessages();
        }

        async function fetchMessages() {
            const user = (await _supabase.auth.getUser()).data.user;
            const { data } = await _supabase.from('messages')
                .select('*')
                .or(`and(sender_email.eq.${user.email},receiver_email.eq.${currentChatUser}),and(sender_email.eq.${currentChatUser},receiver_email.eq.${user.email})`)
                .order('created_at', { ascending: true });

            const chatBox = document.getElementById('chat-messages');
            chatBox.innerHTML = data.map(m => `
                <div class="max-w-[80%] p-3 text-sm ${m.sender_email === user.email ? 'chat-bubble-me' : 'chat-bubble-them'}">
                    ${m.content}
                </div>
            `).join('');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function openInbox() {
            alert("To see your inbox, click on the item you want to talk about. Direct inbox coming in next update!");
        }
    </script>
</body>
</html>
